<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Krynet.ai — Ultra-private instant messaging and VOIP. Iceland-based privacy-first communication platform.">
  <title>Krynet.ai</title>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.bunny.net cdn.jsdelivr.net; font-src fonts.bunny.net cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self';">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=orbitron:400,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js" defer></script>

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #0b0f19;
      color: #f3f4f6;
    }
    .glitch-text {
      text-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-between tracking-wide selection:bg-emerald-500 selection:text-black">

  <div class="w-full flex flex-col flex-grow">
    
    <nav class="border-b border-gray-800 bg-opacity-70 backdrop-filter backdrop-blur-lg sticky top-0 z-50 px-6 py-4">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="brand text-2xl font-bold tracking-widest">
          <span class="text-white">Krynet</span><span class="text-emerald-500">.ai</span>
        </div>
        <div class="text-xs bg-emerald-500 text-black px-3 py-1 font-bold rounded tracking-widest uppercase animate-pulse">
          Official Drop
        </div>
      </div>
    </nav>

    <header class="text-center max-w-4xl mx-auto px-6 py-16 flex flex-col items-center">
      <div class="mb-6">
        <img id="main-logo" alt="Krynet.ai Logo" class="h-20 w-auto filter drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]" style="display: none;">
      </div>
      
      <h1 id="main-title" class="text-3xl md:text-5xl font-extrabold mb-4 text-white glitch-text">Krynet.ai</h1>
      <p id="main-intro" class="text-gray-400 text-sm md:text-lg max-w-2xl leading-relaxed mb-8"></p>

      <div class="bg-gray-900 bg-opacity-50 border border-gray-800 rounded-xl p-6 md:p-8 w-full max-w-md shadow-2xl backdrop-blur-sm">
        <div class="flex items-center justify-center space-x-3 text-emerald-400 font-semibold text-lg">
          <i class="fa-solid fa-calendar-days animate-bounce"></i>
          <span id="countdown">Calculating...</span>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24 w-full space-y-16">
      
      <section id="ceo-display" class="bg-gradient-to-r from-gray-900 to-black border border-gray-800 rounded-xl p-6 shadow-xl max-w-2xl mx-auto" style="display: none;">
        <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6">
          <img id="ceo-img" alt="Executive Leadership" class="w-24 h-24 rounded-full border-2 border-emerald-500 object-cover shadow-lg">
          <div class="text-center sm:text-left">
            <h3 id="ceo-name" class="text-xl font-bold text-white mb-1"></h3>
            <p id="ceo-bio" class="text-gray-400 text-sm leading-relaxed"></p>
          </div>
        </div>
      </section>

      <section class="space-y-6">
        <h2 class="text-xl font-bold border-l-4 border-emerald-500 pl-3 text-white flex items-center space-x-2">
          <i class="fa-solid fa-layer-group text-emerald-400"></i>
          <span>Supported Platforms</span>
        </h2>
        <div id="platforms-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          </div>
      </section>

      <section class="space-y-6">
        <h2 class="text-xl font-bold border-l-4 border-emerald-500 pl-3 text-white flex items-center space-x-2">
          <i class="fa-solid fa-microchip text-emerald-400"></i>
          <span>Core Infrastructure Stack</span>
        </h2>
        <div id="tech-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
          </div>
      </section>

      <div id="dynamic-sections" class="space-y-16">
        </div>

    </main>

    <footer class="border-t border-gray-800 bg-black bg-opacity-40 py-8 px-6 text-center text-xs text-gray-500 space-y-3 mt-auto">
      <p id="footer-text"></p>
      <div class="flex justify-center items-center space-x-3 text-gray-400 font-semibold">
        <span class="flex items-center space-x-1"><span>🇮🇸</span> <span class="ml-1">Iceland Based</span></span>
        <span>•</span>
        <span>Privacy First</span>
        <span>•</span>
        <span>2030</span>
      </div>
    </footer>

  </div>

  <script src="./java.js" defer></script>
</body>
</html>
