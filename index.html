<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Krynet.ai — Ultra-private instant messaging and VOIP. Sweden-based mixed-source platform.">
  <title>Krynet.ai — Official Launch 2030</title>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' keepandroidopen.org; style-src 'self' 'unsafe-inline' fonts.bunny.net cdn.jsdelivr.net; font-src fonts.bunny.net cdn.jsdelivr.net; img-src 'self' github.com raw.githubusercontent.com data:; connect-src 'self' raw.githubusercontent.com;">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex, nofollow">

  <script defer src="https://keepandroidopen.org/banner.js"></script>

  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=orbitron:400,600,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">
  <script src="java.js" defer></script>
</head>

<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">
        <span class="brand-name">Krynet</span><span class="brand-dot">.ai</span>
      </div>
      <div class="nav-status">OFFICIAL DROP</div>
    </div>
  </nav>

  <header class="hero">
    <div class="logo-container">
      <img id="main-logo" class="site-logo" src="" alt="Krynet.ai" style="display:none;">
    </div>
    <h1 id="main-title" class="title">Loading Krynet...</h1>
    <p id="main-intro" class="intro"></p>

    <div class="release-box">
      <p class="release">
        <i class="fa-solid fa-calendar-days"></i>
        <span id="countdown">Calculating Launch...</span>
      </p>
    </div>
  </header>

  <main class="content-wrapper">
    
    <section class="ceo-section" id="ceo-display" style="display:none;">
      <div class="ceo-card">
        <div class="ceo-img-wrap">
          <img id="ceo-img" src="" alt="CEO">
        </div>
        <div class="ceo-content">
          <h3 id="ceo-name"></h3>
          <p id="ceo-bio"></p>
        </div>
      </div>
    </section>

    <section class="platform-section">
      <h2><i class="fa-solid fa-layer-group"></i> Supported Platforms</h2>
      <div id="platforms-grid" class="icon-grid"></div>
    </section>

    <section class="tech-section">
      <h2><i class="fa-solid fa-microchip"></i> Technology Stack</h2>
      <div id="tech-grid" class="icon-grid"></div>
    </section>

    <div id="dynamic-sections" class="sections-container"></div>

  </main>

  <footer class="footer">
    <p id="footer-text"></p>
    <div class="footer-legal">
      <span>Sweden</span> • <span>Privacy First</span> • <span>2030</span>
    </div>
  </footer>

</body>
</html>
