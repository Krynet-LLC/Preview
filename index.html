<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Krynet.ai — Privacy-first instant messaging platform. Official release.">
  <title>Krynet.ai — Official Launch</title>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' keepandroidopen.org; style-src 'self' 'unsafe-inline' fonts.bunny.net cdn.jsdelivr.net; font-src fonts.bunny.net cdn.jsdelivr.net; img-src 'self' github.com raw.githubusercontent.com data:;">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex, nofollow">

  <script defer src="https://keepandroidopen.org/banner.js"></script>

  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=orbitron:400,600,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">

  <script src="java.js" defer></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">
        <span class="brand-name">Krynet</span><span class="brand-dot">.ai</span>
      </div>
      <div class="nav-status">
        OFFICIAL DROP
      </div>
    </div>
  </nav>

  <header class="hero">
    <img class="site-logo" src="" alt="Krynet.ai Logo" loading="eager">

    <h1 class="title"></h1>

    <p class="intro"></p>

    <div class="release-container">
      <p class="release">
        <i class="fa-solid fa-calendar-check"></i>
        <span></span>
      </p>
    </div>
  </header>

  <section class="ceo-section">
    <div class="ceo-card">
      <img src="" alt="Krynet CEO" id="ceo-img">
      <div class="ceo-info">
        <h3 id="ceo-name"></h3>
        <p id="ceo-bio"></p>
      </div>
    </div>
  </section>

  <section class="platform-section">
    <h2>Available Platforms</h2>
    <div class="icon-grid platforms"></div>
  </section>

  <section class="tech-section">
    <h2>Built With</h2>
    <div class="icon-grid tech"></div>
  </section>

  <main>
    <div class="sections-container">
      </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p id="footer-text"></p>
    </div>
  </footer>

</body>
</html>
