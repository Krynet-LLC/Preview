<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Krynet.ai — Ultra-private instant messaging and VOIP. Iceland-based privacy-first communication platform.">
  <title>Krynet.ai — Official Platform 2030</title>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' cdn.jsdelivr.net unpkg.com keepandroidopen.org; style-src 'self' 'unsafe-inline' fonts.bunny.net cdn.jsdelivr.net; font-src fonts.bunny.net cdn.jsdelivr.net; img-src 'self' github.com raw.githubusercontent.com data:; connect-src 'self' raw.githubusercontent.com;">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=orbitron:400,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script defer src="https://keepandroidopen.org/banner.js"></script>

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #0b0f19;
      color: #f3f4f6;
    }
    .glitch-text {
      text-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-between tracking-wide selection:bg-emerald-500 selection:text-black">

  <div x-data="krynetState" class="w-full flex flex-col flex-grow">
    
    <nav class="border-b border-gray-800 bg-opacity-70 backdrop-filter backdrop-blur-lg sticky top-0 z-50 px-6 py-4">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="brand text-2xl font-bold tracking-widest">
          <span class="text-white">Krynet</span><span class="text-emerald-500">.ai</span>
        </div>
        <div class="text-xs bg-emerald-500 text-black px-3 py-1 font-bold rounded tracking-widest uppercase animate-pulse">
          Official Drop
        </div>
      </div>
    </nav>

    <header class="text-center max-w-4xl mx-auto px-6 py-16 flex flex-col items-center">
      <div class="mb-6" x-show="logoUrl" style="display: none;">
        <img :src="logoUrl" alt="Krynet.ai Logo" class="h-20 w-auto filter drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]">
      </div>
      
      <h1 class="text-3xl md:text-5xl font-extrabold mb-4 text-white glitch-text" x-text="mainTitle">Loading Krynet...</h1>
      <p class="text-gray-400 text-sm md:text-lg max-w-2xl leading-relaxed mb-8" x-text="mainIntro"></p>

      <div class="bg-gray-900 bg-opacity-50 border border-gray-800 rounded-xl p-6 md:p-8 w-full max-w-md shadow-2xl backdrop-blur-sm">
        <div class="flex items-center justify-center space-x-3 text-emerald-400 font-semibold text-lg">
          <i class="fa-solid fa-calendar-days animate-bounce"></i>
          <span x-text="countdownText">Calculating Launch Target...</span>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24 w-full space-y-16">
      
      <section x-show="showCeo" x-transition class="bg-gradient-to-r from-gray-900 to-black border border-gray-800 rounded-xl p-6 shadow-xl max-w-2xl mx-auto" style="display: none;">
        <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6">
          <img :src="ceoImg" alt="Executive Leadership" class="w-24 h-24 rounded-full border-2 border-emerald-500 object-cover shadow-lg">
          <div class="text-center sm:text-left">
            <h3 class="text-xl font-bold text-white mb-1" x-text="ceoName"></h3>
            <p class="text-gray-400 text-sm leading-relaxed" x-text="ceoBio"></p>
          </div>
        </div>
      </section>

      <section class="space-y-6">
        <h2 class="text-xl font-bold border-l-4 border-emerald-500 pl-3 text-white flex items-center space-x-2">
          <i class="fa-solid fa-layer-group text-emerald-400"></i>
          <span>Supported Platforms</span>
        </h2>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <template x-for="platform in platforms" :key="platform.name">
            <div class="bg-gray-900 bg-opacity-40 border border-gray-800 rounded-lg p-4 flex flex-col items-center justify-center space-y-2 hover:border-emerald-500 transition-all duration-300">
              <i :class="platform.icon" class="text-2xl text-emerald-400"></i>
              <span class="text-sm font-semibold text-gray-300" x-text="platform.name"></span>
            </div>
          </template>
        </div>
      </section>

      <section class="space-y-6">
        <h2 class="text-xl font-bold border-l-4 border-emerald-500 pl-3 text-white flex items-center space-x-2">
          <i class="fa-solid fa-microchip text-emerald-400"></i>
          <span>Core Infrastructure Stack</span>
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
          <template x-for="tech in techStack" :key="tech.title">
            <div class="bg-gray-900 bg-opacity-40 border border-gray-800 rounded-lg p-5 flex flex-col space-y-2 hover:bg-gray-900 transition-all duration-300">
              <div class="flex items-center space-x-2 text-emerald-400 font-bold text-sm">
                <i class="fa-solid fa-shield-halved"></i>
                <span x-text="tech.title"></span>
              </div>
              <p class="text-xs text-gray-400 leading-normal" x-text="tech.desc"></p>
            </div>
          </template>
        </div>
      </section>

    </main>

    <footer class="border-t border-gray-800 bg-black bg-opacity-40 py-8 px-6 text-center text-xs text-gray-500 space-y-3 mt-auto">
      <p id="footer-text">🇮🇸 Krynet.ai Security & Privacy Foundation. Secure Client-Server Pipeline.</p>
      <div class="flex justify-center items-center space-x-3 text-gray-400 font-semibold">
        <span class="flex items-center space-x-1"><span>🇮🇸</span> <span class="ml-1">Iceland Based</span></span>
        <span>•</span>
        <span>Privacy First</span>
        <span>•</span>
        <span>2030</span>
      </div>
    </footer>

  </div>

  <script>
    (function () {
      "use strict";

      /**
       * Secure State Object Blueprint for Alpine Interface Coupling
       */
      const stateDefinition = {
        mainTitle: 'Krynet.ai',
        mainIntro: 'Next-generation privacy-first communication architecture. Secure, encrypted routing pipeline optimized for zero footprint.',
        logoUrl: '',
        countdownText: 'System Operational',
        showCeo: false,
        ceoName: '',
        ceoBio: '',
        ceoImg: '',
        
        platforms: [
          { name: 'Linux Sandbox', icon: 'fa-brands fa-linux' },
          { name: 'Android Native', icon: 'fa-brands fa-android' },
          { name: 'iOS Device', icon: 'fa-brands fa-apple' },
          { name: 'Web Client', icon: 'fa-solid fa-globe' }
        ],

        techStack: [
          { title: 'End-to-End Encryption', desc: 'Secure asynchronous double cryptographic ratchets ensuring state isolation.' },
          { title: 'Anonymous Authentication', desc: 'Sign up mechanics needing zero personal identifiers, metadata or tracking tags.' },
          { title: 'Passwordless Hardware', desc: 'Hardware-backed authorization utilizing device WebAuthn / TPM / Secure Enclave integrations.' },
          { title: 'Sciter Engine Core', desc: 'High-performance native rendering framework operating at zero CPU/RAM bloat footprints.' }
        ],

        init() {
          // Verify Luxon runtime presence to defend against page configuration drop-outs
          if (typeof luxon === 'undefined') {
            this.countdownText = "PLATFORM LIVE";
            return;
          }

          const DateTime = luxon.DateTime;
          // Synchronized layout coordinate targets to lock directly with your official 2030 schedule
          const targetDate = DateTime.fromISO("2030-12-31T23:59:59", { zone: 'UTC' });
          
          const updateClock = () => {
            const now = DateTime.utc();
            
            if (now >= targetDate) {
              this.countdownText = "PLATFORM LIVE";
              return;
            }

            const diff = targetDate.diff(now, ['months', 'days', 'hours', 'minutes', 'seconds']).toObject();
            
            const months = Math.floor(diff.months || 0);
            const days = Math.floor(diff.days || 0);
            const hours = Math.floor(diff.hours || 0);
            const minutes = Math.floor(diff.minutes || 0);

            this.countdownText = `${months}M ${days}D ${hours}H ${minutes}M SECURE`;
          };

          updateClock();
          setInterval(updateClock, 1000);
        }
      };

      // Ensure proper timing alignment for dynamic framework compilation on GitHub Pages branches
      if (typeof Alpine !== 'undefined') {
        Alpine.data('krynetState', () => stateDefinition);
      } else {
        document.addEventListener('alpine:init', () => {
          Alpine.data('krynetState', () => stateDefinition);
        });
      }
    })();
  </script>
</body>
</html>
